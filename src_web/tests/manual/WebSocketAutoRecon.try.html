<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <script type="module">
      /**
       * Test for `WebSocketAutoRecon.js`
       *
       * Test steps:
       *   1. Execute `main.js` (in same directory) with Deno - `deno run --allow-net --allow-read main.js`
       *   2. Access to `http://localhost:8000/WebSocketAutoRecon.try.html` with browser
       *   3. Open JavaScript console
       *   4. Check display view or console
       *
       * Test cases:
       *   - Can reconnect websocket when disconnected after specified duration
       */
      import { WebSocketAutoRecon } from "/static/WebSocketAutoRecon.js"

      window.addEventListener("load", () => {
        const web_socket_auto_recon = new WebSocketAutoRecon("/api/websocket-auto-disconnect", 3000);
        web_socket_auto_recon.on_open = () => console.log("Opened - Expects disconnected after 2 sec");
        web_socket_auto_recon.on_close = () => console.log("Closed - Expects connected after 3 sec");
        web_socket_auto_recon.on_error = () => console.log("Error - Expects connected after 3 sec");
      });
    </script>
  </head>

  <body>
  </body>
</html>
